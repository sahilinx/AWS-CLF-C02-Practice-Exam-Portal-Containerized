services:
 frontend:
  build: ./frontend
  ports:
   - "80:80"
  depends_on:
   - backend
   
 backend:
  build: ./backend
  ports:
   - "5000:5000"
  environment:
   DB_HOST: db
   DB_NAME: examdb
   DB_USER: postgres
   DB_PASSWORD: secret
  depends_on:
   - db
   
 db:
  image: postgres:16-alpine
  environment:
   POSTGRES_DB: examdb
   POSTGRES_USER: postgres
   POSTGRES_PASSWORD: secret
  volumes:
   - pgdata:/var/lib/postgres/data
   
volumes:
 pgdata:
